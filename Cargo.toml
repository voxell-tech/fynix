[package]
name = "fynix"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/voxell-tech/fynix"
description = "A composable, declarative UI framework."
keywords = ["ui", "gui", "layout", "typst", "reactive"]
categories = ["gui", "graphics", "visualization", "rendering"]
readme = "./README.md"

[dependencies]
rectree = { git = "https://github.com/voxell-tech/rectree", rev = "29f557d" }
hashbrown = "0.16.1"
field_path = { git = "https://github.com/voxell-tech/field_path", rev = "1e8f41c"}
sparse_map = "0.1.2"
parley = { version = "0.7.0", default-features = false, features = ["libm"] }
# Vello is std, we need to make this a feature, and allow using vello_cpu in the future.
# Or better yet, make our renderer backend agnostic.
vello = "0.7.0"
